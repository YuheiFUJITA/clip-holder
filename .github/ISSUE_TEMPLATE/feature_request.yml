name: 機能リクエスト
description: 新しい機能やアイデアを提案する
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        機能リクエストをお寄せいただきありがとうございます。
        以下のフォームにできるだけ詳しくご記入ください。

  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: どのような機能を追加してほしいですか？
      placeholder: 例）クリップボード履歴をカテゴリ別に分類できる機能がほしい
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 背景・動機
      description: この機能がなぜ必要ですか？どのような問題を解決しますか？
      placeholder: 例）履歴が多くなると目的のクリップを見つけるのに時間がかかるため

  - type: textarea
    id: proposed-solution
    attributes:
      label: 提案する解決策
      description: 理想的な動作や実装方法のイメージがあれば教えてください。

  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
      description: 他に考えた方法があれば教えてください。

  - type: textarea
    id: additional-context
    attributes:
      label: その他の情報
      description: スクリーンショットや参考リンクなど、補足情報があれば追加してください。
